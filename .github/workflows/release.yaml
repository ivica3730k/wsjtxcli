name: Release artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: "1.8.5"

      - name: Set version from tag
        run: poetry version "${GITHUB_REF_NAME#v}"

      - name: Build
        run: poetry build

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz

  build-binary:
    name: Build portable Linux binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: "1.8.5"

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version from tag
        run: poetry version "${{ steps.ver.outputs.version }}"

      - name: Install project and build tools
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller staticx

      - name: Build PyInstaller binary
        run: pyinstaller --onefile --name wsjtxcli --collect-submodules wsjtxcli wsjtxcli/main.py

      - name: Make static binary
        run: staticx dist/wsjtxcli dist/wsjtxcli-linux-x86_64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wsjtxcli-linux-x86_64

  build-deb:
    name: Build Ubuntu .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: "1.8.5"

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version from tag
        run: poetry version "${{ steps.ver.outputs.version }}"

      - name: Install project and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Build Linux binary
        run: pyinstaller --onefile --name wsjtxcli --collect-submodules wsjtxcli wsjtxcli/main.py

      - name: Stage files for packaging
        run: |
          mkdir -p pkgroot/usr/bin
          install -m 0755 dist/wsjtxcli pkgroot/usr/bin/wsjtxcli

      - name: Build .deb
        run: |
          fpm -s dir -t deb \
            -n wsjtxcli \
            -v "${{ steps.ver.outputs.version }}" \
            --description "WSJT-X CLI Wrapper" \
            --maintainer "Ivica <ivica@example.com>" \
            --depends wsjtx \
            --depends xvfb \
            --architecture amd64 \
            -C pkgroot \
            usr

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"